<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Birthday Mystery</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        margin: 0;
        font-family: "Poppins", sans-serif;

        background:
          radial-gradient(at 10% 20%, #ff9a9e 0, transparent 50%),
          radial-gradient(at 80% 0%, #a1c4fd 0, transparent 50%),
          radial-gradient(at 0% 50%, #fbc2eb 0, transparent 50%),
          radial-gradient(at 80% 50%, #f6d365 0, transparent 50%);

        background-size: 200% 200%;
        animation: bg 12s infinite alternate;

        color: rgb(40, 134, 28);
        text-align: center;
        overflow-x: hidden;
      }

      @keyframes bg {
        0% {
          background-position: 0% 50%;
        }
        100% {
          background-position: 100% 50%;
        }
      }

      section {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 60px 20px;
      }

      .overlay-content {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(12px);
        padding: 40px;
        border-radius: 20px;
        max-width: 700px;
        width: 90%;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
      }

      .hidden {
        display: none !important;
      }

      h1 {
        margin-bottom: 40px;
      }

      input {
        padding: 14px;
        border-radius: 25px;
        border: none;
        width: 260px;
        font-size: 16px;
        margin: 15px 0;
      }

      button {
        padding: 14px 35px;
        border: none;
        border-radius: 30px;
        background: linear-gradient(135deg, #ff2e63, #ff6a88);
        color: white;
        font-size: 18px;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        transform: scale(1.08);
      }

      #countdown {
        font-size: 90px;
        font-weight: 700;
      }

      .gallery {
        display: flex;
        flex-wrap: wrap;
        gap: 25px;
        justify-content: center;
        margin-top: 30px;
      }

      .card {
        width: 240px;
        background: white;
        color: black;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.35);
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
        transform-style: preserve-3d;
        perspective: 1000px;
      }

      .card img {
        width: 100%;
        height: 220px;
        object-fit: cover;
        transition: transform 0.4s;
      }

      .card:hover {
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.45);
      }

      .card:hover img {
        transform: scale(1.08);
      }

      .card p {
        padding: 12px;
        margin: 0;
      }

      .cake {
        position: relative;
        width: 250px;
        margin: 80px auto 30px;
      }

      .layer {
        height: 60px;
        border-radius: 10px;
      }

      .l1 {
        background: #ff8fab;
        width: 190px;
        margin: auto;
      }
      .l2 {
        background: #ff5c8a;
        width: 220px;
        margin: auto;
        margin-top: -10px;
      }
      .l3 {
        background: #ff2e63;
        width: 250px;
        margin: auto;
        margin-top: -10px;
      }

      .candle {
        position: absolute;
        top: -80px;
        left: 50%;
        transform: translateX(-50%);
        width: 14px;
        height: 70px;
        background: white;
        border-radius: 5px;
      }

      .flame {
        position: absolute;
        top: -5px;
        left: -5px;
        width: 24px;
        height: 24px;
        background: gold;
        border-radius: 50% 50% 10% 50%;
        transform: rotate(-45deg);
        box-shadow: 0 0 20px gold;
        animation: flicker 0.25s infinite alternate;
      }

      @keyframes flicker {
        from {
          transform: rotate(-45deg) scale(1);
        }
        to {
          transform: rotate(-43deg) scale(1.1);
        }
      }

      .balloon {
        position: fixed;
        bottom: -150px;
        width: 50px;
        height: 70px;
        border-radius: 50%;
        animation: floatUp 7s linear infinite;
      }

      .balloon::after {
        content: "";
        position: absolute;
        width: 2px;
        height: 60px;
        background: white;
        left: 50%;
        top: 70px;
      }

      @keyframes floatUp {
        0% {
          transform: translateY(0);
        }
        100% {
          transform: translateY(-120vh);
        }
      }

      .confetti {
        position: fixed;
        width: 10px;
        height: 10px;
        top: -10px;
        animation: fall 3s linear;
      }

      @keyframes fall {
        to {
          transform: translateY(110vh) rotate(720deg);
          opacity: 0;
        }
      }

      .big {
        font-size: 60px;
        margin-bottom: 20px;
        text-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
      }
    </style>
  </head>

  <body>
    <section id="entry">
      <div class="overlay-content">
        <h1>Wait! Who are you? 🤔</h1>
        <p>Our favourite pizza?</p>
        <input id="answer" placeholder="Type answer" />
        <br />
        <button id="enterBtn" disabled onclick="enterSite()">Enter</button>
      </div>
    </section>

    <section id="countSection" class="hidden">
      <div class="overlay-content">
        <h1>Get Ready For Something Special ✨</h1>
        <div id="countdown">5</div>
      </div>
    </section>

    <section id="memorySection" class="hidden">
      <div class="overlay-content">
        <h1>Our Memories 📸</h1>

        <div class="gallery">
          <div class="card">
            <img src="image1.jpg" />
            <p>Our first crazy photo 😄</p>
          </div>

          <div class="card">
            <img src="image2.jpg" />
            <p>The day we laughed too much 😂</p>
          </div>

          <div class="card">
            <img src="image3.jpg" />
            <p>One of my favourite memories ❤️</p>
          </div>
        </div>

        <button onclick="nextCake()">Next Surprise 🎂</button>
      </div>
    </section>

    <section id="cakeSection" class="hidden">
      <div class="overlay-content">
        <h1>Make A Wish 🎂</h1>

        <div class="cake">
          <div class="candle">
            <div class="flame" id="flame"></div>
          </div>

          <div class="layer l1"></div>
          <div class="layer l2"></div>
          <div class="layer l3"></div>
        </div>

        <button onclick="blow()">Blow The Candles 🕯</button>
      </div>
    </section>

    <section id="finalSection" class="hidden">
      <div class="overlay-content">
        <div class="big">🎉 HAPPY BIRTHDAY 🎉</div>
        <p>You make life brighter every day ✨</p>
        <p>I hope this surprise made you smile ❤️</p>

        <audio controls autoplay loop style="margin-top: 20px">
          <source
            src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
          />
        </audio>
      </div>
    </section>

    <script>
      let input = document.getElementById("answer");
      let btn = document.getElementById("enterBtn");

      const correct = "paneer";

      input.addEventListener("input", () => {
        btn.disabled = input.value.toLowerCase().trim() !== correct;
      });

      function enterSite() {
        hide("entry");
        show("countSection");
        startCountdown();
      }

      function startCountdown() {
        let count = 5;
        let el = document.getElementById("countdown");

        let interval = setInterval(() => {
          count--;
          el.innerText = count;

          if (count <= 0) {
            clearInterval(interval);
            hide("countSection");
            show("memorySection");
          }
        }, 1000);
      }

      function nextCake() {
        hide("memorySection");
        show("cakeSection");
      }

      function blow() {
        document.getElementById("flame").style.display = "none";

        for (let i = 0; i < 60; i++) {
          let c = document.createElement("div");
          c.className = "confetti";
          c.style.left = Math.random() * 100 + "vw";
          c.style.background = "hsl(" + Math.random() * 360 + ",100%,60%)";
          document.body.appendChild(c);
          setTimeout(() => c.remove(), 3000);
        }

        for (let i = 0; i < 15; i++) {
          let b = document.createElement("div");
          b.className = "balloon";
          b.style.left = Math.random() * 100 + "vw";
          b.style.background = "hsl(" + Math.random() * 360 + ",70%,60%)";
          b.style.animationDuration = Math.random() * 3 + 5 + "s";
          document.body.appendChild(b);
        }

        setTimeout(() => {
          hide("cakeSection");
          show("finalSection");
        }, 2000);
      }

      function hide(id) {
        document.getElementById(id).classList.add("hidden");
      }

      function show(id) {
        document.getElementById(id).classList.remove("hidden");
      }

      const cards = document.querySelectorAll(".card");

      cards.forEach((card) => {
        card.addEventListener("mousemove", (e) => {
          const rect = card.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;

          const rotateX = -(y - rect.height / 2) / 10;
          const rotateY = (x - rect.width / 2) / 10;

          card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.05)`;
        });

        card.addEventListener("mouseleave", () => {
          card.style.transform = "rotateX(0) rotateY(0) scale(1)";
        });
      });
    </script>
  </body>
</html>
